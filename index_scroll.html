<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>一卷修仙</title>
<style>
:root {
    --void: #0a0a14;
    --ink: #12122a;
    --jade: #5fb0a8;
    --gold: #e8c547;
    --gold-dim: #a89030;
    --paper: #f0ebe0;
    --paper-dim: #9a9488;
    --mist: #6b6b7a;
    --red: #c0392b;
    --card: rgba(18,18,42,0.85);
    --fade-line: rgba(240,235,224,0.06);
}
* { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior:smooth; }
body {
    background: var(--void);
    color: var(--paper);
    font-family: 'STKaiti','KaiTi','楷体','Microsoft YaHei','微软雅黑',sans-serif;
    min-height:100vh;
    overflow-x:hidden;
    user-select:none;
    -webkit-user-select:none;
    -webkit-tap-highlight-color:transparent;
}
body::before {
    content:''; position:fixed; inset:0;
    background:
        radial-gradient(ellipse at 20% 0%, rgba(95,176,168,0.04) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 100%, rgba(232,197,71,0.03) 0%, transparent 50%);
    pointer-events:none; z-index:0;
}
.app { max-width:480px; margin:0 auto; position:relative; z-index:1; }

/* ===== 顶栏 ===== */
.top-bar {
    position:sticky; top:0; z-index:100;
    display:flex; align-items:center; justify-content:space-between;
    padding:10px 16px;
    background:linear-gradient(180deg,rgba(10,10,20,0.96),rgba(10,10,20,0.88));
    backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px);
    border-bottom:1px solid rgba(95,176,168,0.1);
}
.top-realm {
    display:flex; align-items:center; gap:8px;
    font-size:15px; font-weight:bold; color:var(--gold);
}
.top-realm .badge {
    width:32px; height:32px; border-radius:50%;
    background:linear-gradient(135deg,var(--jade),#2a6a64);
    display:flex; align-items:center; justify-content:center;
    font-size:16px; box-shadow:0 0 12px rgba(95,176,168,0.3);
}
.top-stones { font-size:13px; color:var(--gold-dim); }
.top-stones .icon { margin-right:2px; }

/* ===== 提示浮层 ===== */
.toast {
    position:fixed; top:60px; left:50%; transform:translateX(-50%) translateY(-20px);
    background:rgba(232,197,71,0.15); color:var(--gold);
    padding:6px 16px; border-radius:20px; font-size:13px;
    border:1px solid rgba(232,197,71,0.25);
    opacity:0; transition:all 0.4s; pointer-events:none; z-index:200;
}
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
.toast.error { background:rgba(192,57,43,0.15); color:var(--red); border-color:rgba(192,57,43,0.25); }

/* ===== 主滚动区 ===== */
.scroll { padding:0 0 120px; }

/* ===== 叙事间隔 ===== */
.narrative {
    padding:28px 20px 20px; text-align:center;
    font-size:15px; line-height:2; color:var(--paper-dim);
    position:relative;
}
.narrative::before,.narrative::after {
    content:'· · ·'; display:block; text-align:center;
    color:rgba(240,235,224,0.12); font-size:20px; letter-spacing:12px;
    margin-bottom:16px;
}
.narrative::after { margin-bottom:0; margin-top:16px; }
.narrative.fresh { color:var(--paper); animation:fadeUp 0.8s ease; }

/* ===== 修炼区 ===== */
.cultivate-section {
    padding:20px; text-align:center;
}
.cultivate-section .intro {
    font-size:14px; color:var(--paper-dim); line-height:2;
    margin-bottom:16px;
}
.realm-display {
    display:inline-flex; flex-direction:column; align-items:center;
    margin-bottom:20px;
}
.realm-display .name {
    font-size:22px; font-weight:bold; color:var(--gold);
    text-shadow:0 0 20px rgba(232,197,71,0.3);
    margin-bottom:4px;
}
.realm-display .sub {
    font-size:13px; color:var(--jade);
}
.progress-wrap {
    width:100%; max-width:320px; margin:0 auto 16px;
}
.progress-bar {
    height:6px; background:rgba(255,255,255,0.06);
    border-radius:3px; overflow:hidden; margin-bottom:6px;
}
.progress-fill {
    height:100%; border-radius:3px;
    background:linear-gradient(90deg,var(--jade),var(--gold));
    transition:width 0.3s;
    box-shadow:0 0 8px rgba(95,176,168,0.4);
}
.progress-label {
    display:flex; justify-content:space-between;
    font-size:12px; color:var(--mist);
}

/* ===== 按钮 ===== */
.btn {
    display:inline-block; padding:10px 32px; border-radius:24px;
    font-size:15px; font-family:inherit; font-weight:bold;
    cursor:pointer; transition:all 0.3s;
    border:1px solid transparent;
    position:relative; overflow:hidden;
}
.btn-cultivate {
    background:linear-gradient(135deg,rgba(95,176,168,0.2),rgba(95,176,168,0.05));
    border-color:rgba(95,176,168,0.3); color:var(--jade);
}
.btn-cultivate:hover { border-color:var(--jade); box-shadow:0 0 20px rgba(95,176,168,0.2); }
.btn-cultivate.active {
    background:linear-gradient(135deg,var(--jade),#2a6a64);
    color:#fff; border-color:var(--jade);
    animation:pulse 2s infinite;
}
.btn-breakthrough {
    background:linear-gradient(135deg,rgba(232,197,71,0.25),rgba(232,197,71,0.08));
    border-color:rgba(232,197,71,0.35); color:var(--gold);
    font-size:18px; padding:14px 48px; letter-spacing:4px;
}
.btn-breakthrough:hover { border-color:var(--gold); box-shadow:0 0 30px rgba(232,197,71,0.25); }
.btn-sm {
    padding:6px 16px; font-size:13px; border-radius:16px;
}
.btn-buy {
    background:rgba(232,197,71,0.12); border-color:rgba(232,197,71,0.25); color:var(--gold-dim);
}
.btn-buy:hover { border-color:var(--gold); color:var(--gold); }
.btn-learn {
    background:rgba(95,176,168,0.12); border-color:rgba(95,176,168,0.25); color:var(--jade);
}
.btn-learn:hover { border-color:var(--jade); }
.btn-owned { opacity:0.4; cursor:default; }
.btn-choice {
    background:rgba(95,176,168,0.1); border-color:rgba(95,176,168,0.2); color:var(--paper);
    width:100%; text-align:left; padding:12px 16px; border-radius:12px; margin-bottom:6px;
}
.btn-choice:hover { border-color:var(--jade); background:rgba(95,176,168,0.15); }

/* ===== 系统卡片 ===== */
.system-section {
    margin:16px 16px 24px;
    background:var(--card);
    border:1px solid rgba(95,176,168,0.08);
    border-radius:16px;
    padding:20px;
    backdrop-filter:blur(8px);
    display:none;
}
.system-section.unlocked { display:block; animation:fadeUp 0.5s ease; }
.system-section .section-title {
    font-size:16px; font-weight:bold; color:var(--gold);
    margin-bottom:16px; display:flex; align-items:center; gap:8px;
}
.system-section .section-title::before { content:'✦'; color:var(--gold); font-size:14px; }

/* 功法卡片 */
.skill-card {
    display:flex; align-items:center; justify-content:space-between;
    padding:12px; margin-bottom:8px;
    background:rgba(255,255,255,0.03); border-radius:10px;
    border:1px solid rgba(255,255,255,0.04);
}
.skill-card:last-child { margin-bottom:0; }
.skill-info { flex:1; }
.skill-info .name { font-size:14px; color:var(--paper); margin-bottom:2px; }
.skill-info .name .grade { font-size:12px; margin-left:6px; }
.skill-info .name .grade.earth { color:#7b5ea7; }
.skill-info .name .grade.spirit { color:#5fb0a8; }
.skill-info .name .grade.sky { color:var(--gold); }
.skill-info .desc { font-size:12px; color:var(--mist); }
.skill-cost { font-size:12px; color:var(--gold-dim); margin-right:8px; flex-shrink:0; }

/* 丹药卡片 */
.pill-card {
    display:flex; align-items:center; justify-content:space-between;
    padding:10px 12px; margin-bottom:6px;
    background:rgba(255,255,255,0.03); border-radius:10px;
    border:1px solid rgba(255,255,255,0.04);
}
.pill-card:last-child { margin-bottom:0; }
.pill-info .name { font-size:13px; color:var(--paper); }
.pill-info .effect { font-size:12px; color:var(--mist); }
.pill-cost { font-size:12px; color:var(--gold-dim); margin-right:8px; }
.pill-qty { font-size:12px; color:var(--jade); margin-right:8px; }

/* 商店物品 */
.shop-card {
    display:flex; align-items:center; justify-content:space-between;
    padding:10px 12px; margin-bottom:6px;
    background:rgba(255,255,255,0.03); border-radius:10px;
    border:1px solid rgba(255,255,255,0.04);
}
.shop-card:last-child { margin-bottom:0; }

/* 奇遇卡片 */
.encounter-card {
    margin:24px 16px; padding:20px;
    background:linear-gradient(135deg,rgba(232,197,71,0.05),rgba(95,176,168,0.05));
    border:1px solid rgba(232,197,71,0.15); border-radius:16px;
    animation:slideIn 0.5s ease;
}
.encounter-card .enc-title {
    font-size:15px; font-weight:bold; color:var(--gold); margin-bottom:10px;
}
.encounter-card .enc-desc {
    font-size:13px; color:var(--paper-dim); line-height:1.8; margin-bottom:14px;
}
.encounter-card .enc-resolved {
    color:var(--mist); font-style:italic;
}

/* 突破区 */
.breakthrough-zone {
    margin:24px 16px; padding:24px;
    background:linear-gradient(135deg,rgba(232,197,71,0.08),rgba(255,165,0,0.04));
    border:2px solid rgba(232,197,71,0.3); border-radius:20px;
    text-align:center;
    display:none; animation:fadeUp 0.5s ease;
}
.breakthrough-zone.ready { display:block; }
.breakthrough-zone .bt-arrow { font-size:24px; color:var(--gold-dim); margin:8px 0; }
.breakthrough-zone .bt-rate { font-size:13px; color:var(--mist); margin:12px 0; }

/* 底部占位 */
.bottom-pad { height:80px; }

/* ===== 动画 ===== */
@keyframes fadeUp {
    from { opacity:0; transform:translateY(16px); }
    to { opacity:1; transform:translateY(0); }
}
@keyframes slideIn {
    from { opacity:0; transform:translateX(-20px); }
    to { opacity:1; transform:translateX(0); }
}
@keyframes pulse {
    0%,100% { box-shadow:0 0 8px rgba(95,176,168,0.3); }
    50% { box-shadow:0 0 20px rgba(95,176,168,0.6); }
}
@keyframes breakthroughFlash {
    0% { box-shadow:0 0 0 rgba(232,197,71,0); }
    50% { box-shadow:0 0 60px rgba(232,197,71,0.6),0 0 120px rgba(255,165,0,0.3); }
    100% { box-shadow:0 0 0 rgba(232,197,71,0); }
}
.breakthrough-success { animation:breakthroughFlash 1.5s ease; }

/* 响应式 */
@media (max-width:400px) {
    .system-section { margin:10px 10px 18px; padding:14px; }
    .encounter-card { margin:18px 10px; padding:16px; }
    .cultivate-section { padding:16px 12px; }
}
</style>
</head>
<body>
<div class="app">
    <!-- 顶栏 -->
    <div class="top-bar">
        <div class="top-realm">
            <div class="badge" id="topBadge">⚗</div>
            <span id="topRealm">炼气境</span>
        </div>
        <div style="display:flex;align-items:center;gap:12px;">
            <button id="resetBtn" onclick="resetGame()" style="background:none;border:1px solid rgba(255,255,255,0.1);color:var(--paper-dim);font-size:11px;padding:3px 10px;border-radius:10px;cursor:pointer;font-family:inherit;">重开</button>
            <div class="top-stones"><span class="icon">💎</span><span id="topStones">0</span></div>
        </div>
    </div>

    <!-- 提示 -->
    <div class="toast" id="toast"></div>

    <!-- 主滚动 -->
    <div class="scroll" id="scroll">

        <!-- 修炼区 -->
        <div class="cultivate-section" id="cultivateSection">
            <div class="intro" id="introText">盘膝而坐，吐纳天地灵气……</div>
            <div class="realm-display">
                <div class="name" id="realmName">炼气境</div>
                <div class="sub" id="subLevelText">第一层</div>
            </div>
            <div class="progress-wrap">
                <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
                <div class="progress-label">
                    <span id="progressCurrent">0</span>
                    <span id="progressTarget">1,000</span>
                </div>
            </div>
            <button class="btn btn-cultivate" id="btnCultivate" onclick="toggleCultivate()">开始修炼</button>
            <div style="font-size:12px;color:var(--mist);margin-top:8px;" id="speedDisplay">10/秒</div>
        </div>

        <!-- 突破区 -->
        <div class="breakthrough-zone" id="breakthroughZone">
            <div style="font-size:16px;color:var(--gold);font-weight:bold;" id="btFrom">炼气境</div>
            <div class="bt-arrow">↓ 突破 ↓</div>
            <div style="font-size:18px;color:var(--gold);font-weight:bold;" id="btTo">筑基境</div>
            <div class="bt-rate">成功率 <span id="btRate" style="color:var(--jade);font-weight:bold;">75%</span></div>
            <button class="btn btn-breakthrough" onclick="attemptBreakthrough()">冲 击 境 界</button>
        </div>

        <!-- 叙事间隔（动态插入） -->
        <div id="narrativeZone"></div>

        <!-- 功法区 -->
        <div class="system-section" id="skillsSection">
            <div class="section-title">功法阁</div>
            <div id="skillsList"></div>
        </div>

        <!-- 丹药区 -->
        <div class="system-section" id="pillsSection">
            <div class="section-title">炼丹房</div>
            <div id="pillsList"></div>
        </div>

        <!-- 商店区 -->
        <div class="system-section" id="shopSection">
            <div class="section-title">灵宝阁</div>
            <div id="shopList"></div>
        </div>

        <!-- 奇遇动态插入点 -->
        <div id="encounterZone"></div>

        <div class="bottom-pad"></div>
    </div>
</div>

<script>
// ==================== 游戏数据 ====================
const REALMS = [
    { id:1, name:'炼气境', short:'炼气', subNames:['引气入体','灵气运转','内视周天','气贯百骸','丹田初开','灵气化雾','神念初成','内外合一','炼气圆满'], cult:[0,100,250,500,900,1500,2500,4000,6000], speed:1.0, slots:1, btRate:85 },
    { id:2, name:'筑基境', short:'筑基', subNames:['灵力凝液','经脉重塑','神识开辟','真元初生','道基稳固','神念如丝','百脉贯通','灵力汹涌','筑基圆满'], cult:[6000,7500,9500,12000,15500,20000,26000,34000,44000], speed:1.5, slots:2, btRate:75 },
    { id:3, name:'金丹境', short:'金丹', subNames:['丹胚凝结','心火煅丹','金纹浮现','灵丹旋转','丹气外放','神通初显','丹成九转','七彩丹霞','金丹圆满'], cult:[44000,55000,69000,86000,107000,133000,165000,205000,255000], speed:2.0, slots:3, btRate:65 },
    { id:4, name:'元婴境', short:'元婴', subNames:['神识化婴','元婴初啼','灵婴成长','元婴出窍','神游太虚','元婴御剑','灵婴通玄','天劫感应','元婴圆满'], cult:[255000,310000,380000,470000,580000,720000,890000,1100000,1360000], speed:3.0, slots:4, btRate:55 },
    { id:5, name:'化神境', short:'化神', subNames:['法则初悟','分魂炼神','神域雏形','万法归宗','天人感应','神念化界','因果初窥','道心通明','化神圆满'], cult:[1360000,1650000,2000000,2420000,2930000,3550000,4300000,5200000,6300000], speed:5.0, slots:5, btRate:45 },
];

const SKILL_GRADES = { earth:'地品', spirit:'灵品', sky:'天品' };
const SKILL_GRADE_COLORS = { earth:'earth', spirit:'spirit', sky:'sky' };

const SKILLS = [
    { id:1, name:'归元吐纳术', grade:'earth', realm:2, cost:500,  desc:'吐纳效率+10%',    effect:{speedBonus:0.1} },
    { id:2, name:'星辰引气诀', grade:'earth', realm:2, cost:800,  desc:'夜间修炼速度+20%', effect:{speedBonus:0.15} },
    { id:3, name:'青木长生功', grade:'spirit', realm:2, cost:2000, desc:'修炼速度+25%',    effect:{speedBonus:0.25} },
    { id:4, name:'太乙真经',   grade:'spirit', realm:3, cost:5000, desc:'修炼速度+35%',    effect:{speedBonus:0.35} },
    { id:5, name:'五雷正法',   grade:'spirit', realm:3, cost:3000, desc:'突破成功率+10%',  effect:{btBonus:0.10} },
    { id:6, name:'九天玄功',   grade:'sky',    realm:4, cost:12000,desc:'修炼速度+50%',    effect:{speedBonus:0.50} },
    { id:7, name:'混沌吞天诀', grade:'sky',    realm:5, cost:30000,desc:'修炼速度+80%',    effect:{speedBonus:0.80} },
];

const RECIPES = [
    { id:1, name:'聚气散',  realm:3, cost:200,  desc:'瞬间获得500修为', effect:{cultivation:500} },
    { id:2, name:'凝神丹',  realm:3, cost:400,  desc:'修炼速度翻倍(30秒)', effect:{speedBoost:2, duration:30} },
    { id:3, name:'筑基丹',  realm:3, cost:1000, desc:'突破成功率+20%',     effect:{btBonus:0.20} },
    { id:4, name:'升婴丹',  realm:4, cost:3000, desc:'突破成功率+30%',     effect:{btBonus:0.30} },
];

const STORE_ITEMS = [
    { id:1, name:'灵草',     realm:3, cost:150,  desc:'炼丹材料' },
    { id:2, name:'玄铁',     realm:3, cost:300,  desc:'炼制法器' },
    { id:3, name:'悟道茶',   realm:4, cost:2000, desc:'修为+2000' },
    { id:4, name:'灵石碎块', realm:3, cost:500,  desc:'获得1000灵石', effect:{stones:1000} },
];

const ENCOUNTERS = [
    { desc:'路遇一位白须老者，他打量你片刻，微微一笑。', choices:[
        { text:'上前请教', result:'老者传授了你一段口诀，修为大增！', effect:{cultivation:500} },
        { text:'拱手作别', result:'老者飘然远去，留下一个储物袋。',  effect:{stones:300} },
    ]},
    { desc:'前方山谷间隐隐有宝光闪烁，似乎有灵物出世。', choices:[
        { text:'前往探查', result:'你发现了一株千年灵芝！', effect:{cultivation:800} },
        { text:'绕道而行', result:'安全通过，但总觉得错过了什么。', effect:{stones:100} },
    ]},
    { desc:'一只受伤的灵狐拦住了去路，哀求地望着你。', choices:[
        { text:'出手救治', result:'灵狐感激涕零，引你找到一处灵脉。', effect:{cultivation:1000} },
        { text:'置之不理', result:'灵狐哀鸣一声消失在丛林中。', effect:{} },
    ]},
    { desc:'天边乌云汇聚，雷声隐隐，似有人在此渡劫。', choices:[
        { text:'远观感悟', result:'观摩雷劫让你对天道有了新的体悟。', effect:{cultivation:600} },
        { text:'速速远离', result:'你安全离开，顺手捡到一块雷击木。', effect:{stones:500} },
    ]},
];

// ==================== 玩家状态 ====================
let player = {
    realm: 1,
    subLevel: 1,
    cultivation: 0,
    spiritStones: 1000,
    skills: [],
    pills: {},
    autoCultivating: false,
    encounterTimer: 0,
    speedBoost: { active:false, multiplier:1, endTime:0 },
    btBoosts: [],
};

// ==================== 存档 ====================
function save() {
    localStorage.setItem('scroll_cultivation', JSON.stringify(player));
}
function load() {
    const raw = localStorage.getItem('scroll_cultivation');
    if (raw) {
        try {
            const saved = JSON.parse(raw);
            player = { ...player, ...saved };
        } catch(e) {}
    }
}
function resetGame() {
    if (!confirm('确定要重新开始吗？所有进度将丢失。')) return;
    localStorage.removeItem('scroll_cultivation');
    location.reload();
}

// ==================== 工具 ====================
function fmt(n) {
    if (n >= 1e8) return (n/1e8).toFixed(1)+'亿';
    if (n >= 1e4) return (n/1e4).toFixed(1)+'万';
    return Math.floor(n).toLocaleString();
}
function getRealm() { return REALMS[player.realm - 1]; }
function getSubCult(realmIdx, subIdx) {
    const r = REALMS[realmIdx];
    return r.cult[Math.min(subIdx, 8)] || r.cult[8];
}
function getTotalSpeedBonuses() {
    let bonus = 0;
    player.skills.forEach(sid => {
        const sk = SKILLS.find(s => s.id === sid);
        if (sk && sk.effect.speedBonus) bonus += sk.effect.speedBonus;
    });
    return bonus;
}
function getCultivationGain() {
    const realm = getRealm();
    let base = 10 * realm.speed;
    base *= (1 + getTotalSpeedBonuses());
    if (player.speedBoost.active && Date.now() < player.speedBoost.endTime) {
        base *= player.speedBoost.multiplier;
    }
    return Math.floor(base);
}
function getBtRate() {
    const realm = getRealm();
    let rate = realm.btRate / 100;
    player.skills.forEach(sid => {
        const sk = SKILLS.find(s => s.id === sid);
        if (sk && sk.effect.btBonus) rate += sk.effect.btBonus;
    });
    player.btBoosts.forEach(b => rate += b);
    return Math.min(0.95, rate);
}

// ==================== 渲染 ====================
function updateTopBar() {
    const realm = getRealm();
    document.getElementById('topRealm').textContent = realm.name;
    document.getElementById('topBadge').textContent = ['⚗','🔮','💎','👁','🌟'][Math.min(player.realm-1, 4)];
    document.getElementById('topStones').textContent = fmt(player.spiritStones);
}
function updateCultivateSection() {
    const realm = getRealm();
    const subIdx = player.subLevel - 1;
    document.getElementById('realmName').textContent = realm.name;
    document.getElementById('subLevelText').textContent = realm.subNames[subIdx] || `第${player.subLevel}层`;
    document.getElementById('speedDisplay').textContent = getCultivationGain() + '/秒';

    const currentTarget = getSubCult(player.realm - 1, subIdx);
    const prevTarget = subIdx > 0 ? getSubCult(player.realm - 1, subIdx - 1) : 0;
    const range = currentTarget - prevTarget;
    const progress = range > 0 ? Math.min(100, ((player.cultivation - prevTarget) / range) * 100) : 0;

    document.getElementById('progressFill').style.width = progress + '%';
    document.getElementById('progressCurrent').textContent = fmt(player.cultivation);
    document.getElementById('progressTarget').textContent = fmt(currentTarget);

    // 突破按钮
    const btn = document.getElementById('btnCultivate');
    if (player.autoCultivating) {
        btn.textContent = '修炼中…';
        btn.classList.add('active');
    } else {
        btn.textContent = '开始修炼';
        btn.classList.remove('active');
    }

    // 突破区
    const btZone = document.getElementById('breakthroughZone');
    if (player.subLevel >= 10 && player.realm < REALMS.length) {
        btZone.classList.add('ready');
        const nextRealm = REALMS[player.realm];
        document.getElementById('btFrom').textContent = realm.name;
        document.getElementById('btTo').textContent = nextRealm.name;
        document.getElementById('btRate').textContent = Math.floor(getBtRate() * 100) + '%';
    } else {
        btZone.classList.remove('ready');
    }
}
function renderSkills() {
    const container = document.getElementById('skillsList');
    const realm = getRealm();
    let html = '';
    const available = SKILLS.filter(s => s.realm <= player.realm);
    if (available.length === 0) {
        html = '<div style="text-align:center;color:var(--mist);padding:16px;">暂无可用功法</div>';
    } else {
        available.forEach(sk => {
            const owned = player.skills.includes(sk.id);
            html += `<div class="skill-card">
                <div class="skill-info">
                    <div class="name">${sk.name}<span class="grade ${SKILL_GRADE_COLORS[sk.grade]}">${SKILL_GRADES[sk.grade]}</span></div>
                    <div class="desc">${sk.desc}</div>
                </div>
                ${owned
                    ? '<span class="skill-cost" style="color:var(--jade);">已习得</span>'
                    : `<span class="skill-cost">💎${fmt(sk.cost)}</span><button class="btn btn-sm btn-learn" onclick="learnSkill(${sk.id})">参悟</button>`
                }
            </div>`;
        });
    }
    container.innerHTML = html;
}
function renderPills() {
    const container = document.getElementById('pillsList');
    let html = '';
    const available = RECIPES.filter(r => r.realm <= player.realm);
    if (available.length === 0) {
        html = '<div style="text-align:center;color:var(--mist);padding:16px;">丹炉冷清，暂无可炼之丹</div>';
    } else {
        available.forEach(r => {
            const qty = player.pills[r.id] || 0;
            html += `<div class="pill-card">
                <div class="pill-info">
                    <div class="name">${r.name}</div>
                    <div class="effect">${r.desc}</div>
                </div>
                <span class="pill-qty">×${qty}</span>
                <span class="pill-cost">💎${fmt(r.cost)}</span>
                <button class="btn btn-sm btn-learn" onclick="concoctPill(${r.id})">炼制</button>
            </div>`;
        });
    }
    if (Object.values(player.pills).some(v => v > 0)) {
        html += '<div style="margin-top:12px;font-size:12px;color:var(--mist);">点击使用：</div>';
        for (const [id, qty] of Object.entries(player.pills)) {
            if (qty <= 0) continue;
            const r = RECIPES.find(r => r.id === parseInt(id));
            if (!r) continue;
            html += `<div class="pill-card" style="margin-top:4px;">
                <div class="pill-info"><div class="name">${r.name} ×${qty}</div></div>
                <button class="btn btn-sm btn-buy" onclick="usePill(${r.id})">使用</button>
            </div>`;
        }
    }
    container.innerHTML = html;
}
function renderShop() {
    const container = document.getElementById('shopList');
    let html = '';
    const available = STORE_ITEMS.filter(item => item.realm <= player.realm);
    available.forEach(item => {
        html += `<div class="shop-card">
            <div class="pill-info">
                <div class="name">${item.name}</div>
                <div class="effect">${item.desc}</div>
            </div>
            <span class="pill-cost">💎${fmt(item.cost)}</span>
            <button class="btn btn-sm btn-buy" onclick="buyItem(${item.id})">购买</button>
        </div>`;
    });
    container.innerHTML = html || '<div style="text-align:center;color:var(--mist);padding:16px;">暂无货品</div>';
}
function updateSystems() {
    // 解锁系统
    const unlockMap = { 2:'skillsSection', 3:'pillsSection', 3:'shopSection' };
    // skills unlock at realm 2
    if (player.realm >= 2) document.getElementById('skillsSection').classList.add('unlocked');
    if (player.realm >= 3) {
        document.getElementById('pillsSection').classList.add('unlocked');
        document.getElementById('shopSection').classList.add('unlocked');
    }
}
function updateAll() {
    updateTopBar();
    updateCultivateSection();
    updateSystems();
    renderSkills();
    renderPills();
    renderShop();
    save();
}

// ==================== 操作 ====================
function showToast(msg, type) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast ' + (type || '');
    t.classList.add('show');
    clearTimeout(t._timeout);
    t._timeout = setTimeout(() => t.classList.remove('show'), 2000);
}
function toggleCultivate() {
    player.autoCultivating = !player.autoCultivating;
    updateCultivateSection();
}
function attemptBreakthrough() {
    if (player.subLevel < 10) { showToast('修为不足，无法突破','error'); return; }
    const rate = getBtRate();
    const success = Math.random() < rate;

    const btZone = document.getElementById('breakthroughZone');

    if (success) {
        btZone.classList.add('breakthrough-success');
        setTimeout(() => btZone.classList.remove('breakthrough-success'), 1500);

        player.realm++;
        player.subLevel = 1;
        player.cultivation = getSubCult(player.realm - 1, 0);
        player.btBoosts = [];

        const newRealm = getRealm();
        // 突破奖励灵石
        const reward = player.realm <= 3 ? 1000 : player.realm <= 5 ? 5000 : 20000;
        player.spiritStones += reward;

        // 叙事
        const narratives = [
            '', '',
            '筑基成功！丹田内灵气凝液，你的感知范围扩大了数倍。从此脱离凡胎，踏上真正的修仙之路。',
            '金丹凝聚！一颗金灿灿的丹丸悬浮丹田中央，周身百骸尽数贯通。天地灵气疯狂涌入，你可御剑飞行，亦可开炉炼丹。',
            '元婴初啼！体内灵婴睁开双眼，你第一次以神识观照天地。万物法则了然于胸，从此神游太虚，无所拘束。',
            '化神已成！法则初悟，道心通明。一念之间神识可覆盖百里，你已站在此界的巅峰——但你知道，这仅仅是开始。',
        ];
        const narrativeZone = document.getElementById('narrativeZone');
        const msg = narratives[player.realm] || `突破至${newRealm.name}！新的天地在你面前展开……`;
        narrativeZone.innerHTML = `<div class="narrative fresh">${msg}<br><span style="color:var(--gold);font-size:13px;">获得突破奖励 💎${fmt(reward)}</span></div>`;
        document.getElementById('encounterZone').innerHTML = '';

        showToast(`突破成功！踏入${newRealm.name}`);

    } else {
        showToast('突破失败！修为受损，继续修炼吧…', 'error');
        player.cultivation = Math.floor(player.cultivation * 0.7);
        player.subLevel = Math.max(1, player.subLevel - 1);
    }

    updateAll();

    // 滚动到叙事区
    setTimeout(() => {
        const nz = document.getElementById('narrativeZone');
        if (nz.children.length) nz.children[0].scrollIntoView({ behavior:'smooth', block:'center' });
    }, 200);
}
function learnSkill(id) {
    const sk = SKILLS.find(s => s.id === id);
    if (!sk) return;
    if (player.skills.includes(id)) { showToast('已习得此功法','error'); return; }
    if (player.spiritStones < sk.cost) { showToast('灵石不足','error'); return; }
    if (sk.realm > player.realm) { showToast('境界不足','error'); return; }

    player.spiritStones -= sk.cost;
    player.skills.push(id);
    showToast(`习得 ${sk.name}！`);
    updateAll();
}
function concoctPill(id) {
    const r = RECIPES.find(r => r.id === id);
    if (!r) return;
    if (player.spiritStones < r.cost) { showToast('灵石不足','error'); return; }
    player.spiritStones -= r.cost;
    player.pills[id] = (player.pills[id] || 0) + 1;
    showToast(`炼制成功：${r.name}`);
    updateAll();
}
function usePill(id) {
    const r = RECIPES.find(r => r.id === id);
    if (!r) return;
    if (!player.pills[id]) { showToast('没有此丹药','error'); return; }
    player.pills[id]--;

    const eff = r.effect;
    if (eff.cultivation) {
        player.cultivation += eff.cultivation;
        showToast(`使用${r.name}，修为+${fmt(eff.cultivation)}`);
    }
    if (eff.speedBoost) {
        player.speedBoost = { active:true, multiplier:eff.speedBoost, endTime:Date.now() + eff.duration * 1000 };
        showToast(`使用${r.name}，修炼速度×${eff.speedBoost}！(${eff.duration}秒)`);
    }
    if (eff.btBonus) {
        player.btBoosts.push(eff.btBonus);
        showToast(`使用${r.name}，突破成功率+${Math.floor(eff.btBonus*100)}%`);
    }

    updateAll();
}
function buyItem(id) {
    const item = STORE_ITEMS.find(i => i.id === id);
    if (!item) return;
    if (player.spiritStones < item.cost) { showToast('灵石不足','error'); return; }

    player.spiritStones -= item.cost;
    if (item.effect) {
        if (item.effect.stones) player.spiritStones += item.effect.stones;
        if (item.effect.cultivation) player.cultivation += item.effect.cultivation;
    }
    showToast(`购买成功：${item.name}`);
    updateAll();
}

// ==================== 奇遇系统 ====================
let activeEncounter = null;
function triggerEncounter() {
    if (player.realm < 3) return;
    if (activeEncounter) return;

    const enc = ENCOUNTERS[Math.floor(Math.random() * ENCOUNTERS.length)];
    activeEncounter = enc;

    let html = `<div class="encounter-card" id="encounterCard">
        <div class="enc-title">✦ 偶遇奇缘</div>
        <div class="enc-desc">${enc.desc}</div>`;
    enc.choices.forEach((c, i) => {
        html += `<button class="btn btn-choice" onclick="resolveEncounter(${i})">${c.text}</button>`;
    });
    html += '</div>';

    document.getElementById('encounterZone').innerHTML = html;
    setTimeout(() => {
        document.getElementById('encounterCard')?.scrollIntoView({ behavior:'smooth', block:'center' });
    }, 100);
}
function resolveEncounter(idx) {
    if (!activeEncounter) return;
    const choice = activeEncounter.choices[idx];
    const eff = choice.effect;

    if (eff.cultivation) player.cultivation += eff.cultivation;
    if (eff.stones) player.spiritStones += eff.stones;
    if (eff.skill && !player.skills.includes(eff.skill)) player.skills.push(eff.skill);

    const card = document.getElementById('encounterCard');
    if (card) {
        card.innerHTML = `<div class="enc-title">✦ ${choice.text}</div>
            <div class="enc-desc enc-resolved">${choice.result}</div>`;
        card.style.borderColor = 'rgba(95,176,168,0.2)';
    }

    showToast(choice.result);
    activeEncounter = null;
    updateAll();
}

// ==================== 游戏循环 ====================
function gameLoop() {
    if (player.autoCultivating) {
        const gain = getCultivationGain();
        player.cultivation += gain;
        player.encounterTimer += gain;

        // 检查升级
        const currentTarget = getSubCult(player.realm - 1, player.subLevel - 1);
        if (player.subLevel < 10 && player.cultivation >= currentTarget) {
            player.subLevel++;
            showToast(`突破至${getRealm().subNames[player.subLevel-1]}！`);
        }

        // 小层9后准备突破（subLevel=10）
        if (player.subLevel >= 9 && player.cultivation >= getSubCult(player.realm - 1, 8)) {
            player.subLevel = 10; // ready for breakthrough
        }

        // 奇遇触发
        if (player.encounterTimer > 5000 + Math.random() * 5000) {
            player.encounterTimer = 0;
            triggerEncounter();
        }

        updateCultivateSection();
    }

    // 速度加成过期检查
    if (player.speedBoost.active && Date.now() >= player.speedBoost.endTime) {
        player.speedBoost.active = false;
    }

    save();
}

// ==================== 启动 ====================
function init() {
    load();
    updateAll();

    // 初始状态：如果老玩家，根据境界解锁
    if (player.realm >= 2) {
        document.getElementById('skillsSection').classList.add('unlocked');
    }
    if (player.realm >= 3) {
        document.getElementById('pillsSection').classList.add('unlocked');
        document.getElementById('shopSection').classList.add('unlocked');
    }

    // 刷新修炼区
    updateCultivateSection();
}

init();
setInterval(gameLoop, 1000);

// 初始叙事
if (player.realm === 1) {
    document.getElementById('narrativeZone').innerHTML = `
        <div class="narrative fresh">
            你睁开眼，发现自己躺在清虚观的后山。<br>
            体内一丝若有若无的灵力在经脉中流淌。<br>
            师尊说：<em style="color:var(--jade);">"静心吐纳，天地灵气自会入体。"</em>
        </div>`;
}
</script>
